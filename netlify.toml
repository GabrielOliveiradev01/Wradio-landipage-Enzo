# Configuração para deploy do app Next.js (monorepo Turborepo)
# App Next.js em apps/web — apps/api é a API Hono (não deployar na Netlify)

[build]
  base = "."
  command = "pnpm build"
  publish = "apps/web"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# Plugin Next.js (OpenNext) — necessário para SSR e rotas funcionarem
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ⚠️ CRÍTICO na Netlify UI > Build & deploy > Build settings:
# Package directory DEVE ser: apps/web (não apps/api!)
