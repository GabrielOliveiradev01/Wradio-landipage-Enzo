# Configuração deploy Next.js (monorepo Turborepo)
# O app web está em apps/web — apps/api é a API (não usar na Netlify!)

[build]
  base = "."
  command = "pnpm build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ⚠️ Package directory DEVE ser apps/web na Netlify UI! Ver NETLIFY-SETUP.md
